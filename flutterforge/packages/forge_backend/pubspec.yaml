name: forge_backend
description: Unified backend abstraction for FlutterForge — Supabase or Firebase
version: 1.0.0
publish_to: none
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"
dependencies:
  flutter:
    sdk: flutter
  forge_core:
    path: ../forge_core
  supabase_flutter: ^2.0.0
  firebase_core: ^2.24.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  dartz: ^0.10.1
  google_sign_in: ^7.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
